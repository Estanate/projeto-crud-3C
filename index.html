<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="src/styles/styles.css">
</head>
<body>
    <header>
        <h1>PHP/JS CRUD Project</h1>
    </header>
    <main>
        <section class="users-container">
            <h2>Users</h2>
            <div class="users">
                <div class="user-card">
                    <div class="user-info">
                        <p><strong>John Doe</strong></p>
                        <p><strong>Age:</strong> 30</p>
                        <p><strong>Email:</strong> john.doe@example.com</p>
                    </div>
                    <div class="user-buttons">
                        <button class="edit">Edit</button>
                        <button class="delete">Delete</button>
                    </div>
                </div>
                <div class="user-card">
                    <div class="user-info">
                        <p><strong>Nagi</strong></p>
                        <p><strong>Age:</strong> 17</p>
                        <p><strong>Email:</strong> nagi.bl@example.com</p>
                    </div>
                    <div class="user-buttons">
                        <button class="edit">Edit</button>
                        <button class="delete">Delete</button>
                    </div>
                </div>
            </div>
        </section>
        <section class="create-user-container">
            <h2>Create User</h2>
                <div class="create-user-area">
                    <form class="create-user-info"action="">
                        <div class="create-username">
                            <label>Name</label>
                            <input type="text" name="username">
                        </div>
                        <div class="create-age">
                            <label>Age</label>
                            <input type="number" name="age">
                        </div>
                        <div class="create-email">
                            <label>E-mail</label>
                            <input type="text" name="email">
                        </div>
                    </form>
                    <button>Create</button>
                </div>
        </section>
    </main>
</body>
</html>
